<!DOCTYPE html>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Harga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
background:#eef3f8;
font-family:sans-serif;
}

.navbar{
background:#29496b;
}

.navbar-brand{
color:white;
font-weight:600;
}

.navbar-brand:hover{
color:white;
}

.card-dashboard{
border:none;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.menu-card{
border:none;
border-radius:12px;
padding:25px;
transition:0.2s;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.menu-card:hover{
transform:translateY(-5px);
}

.icon-box{
width:45px;
height:45px;
background:#e9f1fb;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#4a8edc;
margin-bottom:10px;
}

.card-custom {
border: none;
border-radius: 12px;
box-shadow: 0 5px 15px rgba(0,0,0,0.05);
max-width: 700px;
margin: 20px auto;
}

.form-label {
font-weight: 500;
color: #444;
font-size: 0.9rem;
margin-bottom: 0.2rem;
}

.input-group-text {
background-color: transparent;
border-right: none;
color: #888;
}

.form-control {
border-left: none;
}

.form-control:focus {
box-shadow: none;
border-color: #dee2e6;
}

.btn-save {
background-color: #4a8edc;
border: none;
color: white;
padding: 10px;
font-weight: 500;
}

.btn-save:hover {
background-color: #357abd;
color: white;
}

.preview-item {
display: flex;
justify-content: space-between;
margin-bottom: 8px;
font-size: 0.95rem;
}

.preview-price {
color: #4a8edc;
font-weight: 500;
}
</style>

</head>



<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand">
                <i class="bi bi-stars"></i> Kelola Harga
            </a>
            <a href="dashboard.html" class="btn btn-light btn-sm">
                <i class="bi-arrow-left"></i> Dashboard
            </a>
        </div>
    </nav>

<div class="container">
    <div class="card card-custom p-4">
        <h6 class="mb-4 fw-bold">Pengaturan Harga Layanan</h6>
        
        <div class="mb-3">
            <label class="form-label">Cuci Kering</label>
            <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" class="form-control" value="5000">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Reguler (per kg)</label>
            <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" class="form-control" value="7000">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Express (per kg)</label>
            <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" class="form-control" value="10000">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Super Express (per kg)</label>
            <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" class="form-control" value="15000">
            </div>
        </div>

        <button class="btn btn-save w-100">
            <i class="bi bi-save"></i> Simpan Perubahan
        </button>
    </div>

    <div class="card card-custom p-4">
        <h6 class="mb-4 fw-bold">Preview Harga</h6>
        
        <div class="preview-item">
            <span>Cuci Kering</span>
            <span class="preview-price">Rp 5.000/kg</span>
        </div>
        <div class="preview-item">
            <span>Reguler</span>
            <span class="preview-price">Rp 7.000/kg</span>
        </div>
        <div class="preview-item">
            <span>Express</span>
            <span class="preview-price">Rp 10.000/kg</span>
        </div>
        <div class="preview-item">
            <span>Super Express</span>
            <span class="preview-price">Rp 15.000/kg</span>
        </div>
    </div>
</div>
    
</body>
</html>
